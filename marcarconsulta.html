<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="marcarconsulta.css" type="text/css">
    <title>Document</title>
</head>
<body>
    <!-- Titulo -->
    <h5 class="tituloprincipal">Ficha de Consulta</h5>
    <!-- Tratamentos -->
    <div class="tratamentos">
    <h5 class="titulo">Tratamentos</h5>
    <select id="tratamento">
        <option>Acne</option>
        <option>Rosácea</option> 
        <option>Dermatologia Infantil</option>
        <option>Micose</option>
        <option>Hiperidrose</option>
        <option>Melasma</option>
        <option>Queda de Cabelo</option>
    </select>
    </div>
    <!-- Data de Agendamento -->
    <div class="datinha">
      <h5 class="titulo">Data de Agendamento</h5>
      <input id="agendamento" type="date" class="input" />
  </div>
   <!-- Endereço -->
   <div class="pendereco">
    <h5 class="titulo">Endereço</h5>
    <input id="endereço" type="text" class="input" />
  </div>
  <!-- Telefone -->
  <div class="ptelefone">
    <h5 class="titulo">Telefone</h5>
    <input id="telefone" type="tel" class="input" />
  </div>
  <!-- Celular -->
  <div class="pcelular">
    <h5 class="titulo">Celular</h5>
    <input id="celular" type="tel" class="input" />
  </div>
  <!-- E-mail -->
  <div class="email">
    <h5 class="titulo">E-mail</h5>
    <input id="email" type="text" class="input" />
  </div>
  <!-- Celular -->
  <div class="pcep">
    <h5 class="titulo">CEP</h5>
    <input id="cep" type="tel" class="input" />
  </div>
    <!-- Botão para Salvar -->
<div class="uv-checkbox-wrapper">
  <input type="checkbox" id="uv-checkbox" class="uv-checkbox" />
  <label for="uv-checkbox" class="uv-checkbox-label">
    <div class="uv-checkbox-icon">
      <svg viewBox="0 0 24 24" class="uv-checkmark">
        <path d="M4.1,12.7 9,17.6 20.3,6.3" fill="none"></path>
      </svg>
    </div>
    <span class="uv-checkbox-text">Salvar</span>
  </label>
</div>
  <!-- Botão -->
  <input type="button" value="Voltar" class="botao" />
    <!-- Imagem -->
    <img src="/img/7ff8e95b-85e2-46e2-839a-93f20e944c17-removebg-preview.png" alt="" id="imagem">
